
name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install deps
        run: uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (black)
        run: uv run black --check .

      - name: Unit tests
        run: uv run pytest -q

      - name: Eval smoke (reliability, mock)
        run: uv run python -m llm_lab.cli eval --suite reliability --fault-matrix configs/fault_matrix.yaml